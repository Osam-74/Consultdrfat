name = "consultdrfat-api"
main = "src/index.ts"
compatibility_date = "2024-09-01"

# Set ALLOW_ORIGIN to your deployed PWA origin (Cloudflare Pages URL or custom domain).
[vars]
ALLOW_ORIGIN = "https://consultdrfat.vercel.app"
FIREBASE_PROJECT_ID = "consultdrfat"
# Set R2_PUBLIC_BASE via: wrangler secret put R2_PUBLIC_BASE
# OR add it directly here if it's not sensitive (it's a public URL):
# R2_PUBLIC_BASE = "https://pub-YOURTOKEN.r2.dev"

# R2 bucket for session file uploads (free tier: 10 GB storage, 1M reads/month)
# To create the bucket: wrangler r2 bucket create consultdrfat-session-files
# To make it publicly accessible:
#   1. Go to Cloudflare dashboard → R2 → consultdrfat-session-files → Settings → Public Access → Allow Access
#   2. Copy the public URL base and set it as R2_PUBLIC_BASE var below, e.g.:
#      https://pub-xxxxxxxxxxxxxxxx.r2.dev
[[r2_buckets]]
binding = "SESSION_FILES"
bucket_name = "consultdrfat-session-files"

# Secrets (do NOT put real values here — use: wrangler secret put NAME)
#
#   wrangler secret put PAYSTACK_SECRET_KEY    → sk_live_… or sk_test_…
#   wrangler secret put CF_TURN_KEY_ID         → from Cloudflare Realtime dashboard
#   wrangler secret put CF_TURN_API_TOKEN      → from Cloudflare Realtime dashboard
#   wrangler secret put FIREBASE_SA_JSON       → paste the full JSON content of your
#                                                Firebase service account key file
#                                                (Firebase console → Project Settings →
#                                                 Service Accounts → Generate new private key)
#   wrangler secret put R2_PUBLIC_BASE         → e.g. https://pub-xxxx.r2.dev
#
# After setting secrets, deploy with: wrangler deploy
