name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: consultdrfat.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: consultdrfat
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: consultdrfat.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "101708230797"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:101708230797:web:698b771ef26868be5f32c4"
          NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY }}
          NEXT_PUBLIC_API_BASE: ${{ secrets.NEXT_PUBLIC_API_BASE }}
          NEXT_PUBLIC_PRACTITIONER_UID: ${{ secrets.NEXT_PUBLIC_PRACTITIONER_UID }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: out
          path: out/
          retention-days: 1

      # NOTE: Cloudflare Pages deployment is handled via direct Git integration.
      # Go to dash.cloudflare.com → Workers & Pages → your project → Settings → Builds & deployments
      # Connect to GitHub → pick this repo → build cmd: npm run build → output dir: out
      # Add env vars there (NEXT_PUBLIC_FIREBASE_API_KEY etc.) — no API token needed.
