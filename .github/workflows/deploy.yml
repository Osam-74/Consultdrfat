# This workflow is DISABLED — Cloudflare Pages uses direct Git integration instead.
# Go to: dash.cloudflare.com → Workers & Pages → consultdrfat → Settings → Builds & deployments
# Build command: npm run build
# Build output directory: .next  (NOT "out" — this is a Next.js SSR app, not static export)
# Node.js version: 22
#
# To re-enable GitHub Actions deployment, uncomment below and add these GitHub secrets:
# CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID

name: Build & Deploy to Cloudflare Pages (disabled)

on:
  workflow_dispatch:  # manual trigger only — not automatic

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: consultdrfat.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: consultdrfat
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: consultdrfat.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "101708230797"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:101708230797:web:698b771ef26868be5f32c4"
          NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY }}
        run: npm run build
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .next --project-name=consultdrfat --commit-dirty=true
